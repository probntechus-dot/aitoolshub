<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — AI Tools Hub</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/style.css">
    <style>
        .error-page { text-align: center; padding: 80px 20px; max-width: 600px; margin: 0 auto; }
        .error-code { font-size: 120px; font-weight: 900; color: #e5e7eb; line-height: 1; margin: 0; }
        .error-title { font-size: 28px; font-weight: 700; margin: 16px 0 12px; }
        .error-desc { color: #666; font-size: 16px; line-height: 1.6; margin: 0 0 32px; }
        .error-btn { display: inline-block; padding: 14px 32px; background: #111; color: #fff; border-radius: 10px; text-decoration: none; font-weight: 600; font-size: 15px; }
        .error-btn:hover { background: #333; }
        .error-search { margin: 24px 0; }
        .error-search input { width: 100%; max-width: 400px; padding: 12px 18px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; }
        .error-links { margin-top: 32px; }
        .error-links a { color: #667eea; text-decoration: none; margin: 0 12px; font-size: 14px; }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-inner container">
            <a href="/" class="site-logo">AI Tools Hub</a>
            <nav class="main-nav">
                <a href="/">Home</a>
                <a href="/about">About</a>
                <a href="/resources">Resources</a>
                <a href="/contact">Contact</a>
            </nav>
        </div>
    </header>

    <div class="error-page">
        <p class="error-code">404</p>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-desc">The page you're looking for doesn't exist or has been moved. Try searching for what you need below.</p>
        
        <div class="error-search">
            <form action="/" method="get">
                <input type="text" name="q" placeholder="🔍 Search AI tools, reviews, guides..." autofocus>
            </form>
        </div>
        
        <a href="/" class="error-btn">← Back to Homepage</a>
        
        <div class="error-links">
            <a href="/articles/best-ai-tools-small-business">Best AI Tools</a>
            <a href="/articles/chatgpt-vs-claude">ChatGPT vs Claude</a>
            <a href="/articles/automate-small-business-ai">AI Automation Guide</a>
        </div>
    </div>

    <footer class="site-footer" style="margin-top:60px;padding:32px 0;text-align:center;">
        <div class="container">
            <p style="margin:0;font-size:13px;color:#666;">© 2026 AI Tools Hub. Honest reviews for smart business owners.</p>
        </div>
    </footer>
</body>
</html>
